<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Benchmark Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([52.79933, -6.46431], 14);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

L.marker([52.79933, -6.46431])
.addTo(map)
.bindPopup("Tinahely Library");

L.marker([52.80008, -6.46204])
.addTo(map)
.bindPopup("Tinahely Bridge");

L.marker([52.799734, -6.46034])
.addTo(map)
.bindPopup("Kellys Hill");

</script>

</body>
</html>
